name: Release Backend (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump (major, minor, patch) or specific version (e.g., 1.2.3)"
        required: true
        type: string
        default: patch

jobs:
  validate:
    name: Build and Validate
    uses: ./.github/workflows/reusable-build-validate.yml

  release:
    name: Release
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - run: bun install --frozen-lockfile
        shell: bash

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        working-directory: backend
        run: |
          bun pm version ${{ inputs.version }}
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit and tag
        run: |
          git add .
          git commit -m "chore(release): Backend v${{ steps.version.outputs.version }}"
          git tag "backend-v${{ steps.version.outputs.version }}"
          git push
          git push --tags
