name: Release (CI)

# Publishes the Docker image for tags pushed manually (by a user). Tags created
# by the "Release Backend (Manual)" workflow do NOT trigger this - a tag pushed
# with the automatic GITHUB_TOKEN can't trigger other workflows - so that flow
# calls the reusable publish workflow directly instead.
on:
  push:
    tags:
      - "backend-v*.*.*"

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - id: version
        # backend-v1.2.3 -> 1.2.3
        run: echo "version=${GITHUB_REF_NAME#backend-v}" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish Docker image
    needs: version
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-publish-docker.yml
    with:
      version: ${{ needs.version.outputs.version }}
      ref: ${{ github.ref }}
