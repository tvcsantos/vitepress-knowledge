name: Release Plugin (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump (major, minor, patch) or specific version (e.g., 1.2.3)"
        required: true
        type: string
        default: patch

jobs:
  validate:
    name: Build and Validate
    uses: ./.github/workflows/reusable-build-validate.yml

  release:
    name: Release
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: package.json

      - name: Install Dependencies
        run: bun install --frozen-lockfile
        shell: bash

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        working-directory: plugin
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          bun pm version "$VERSION_INPUT"
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git add .
          git commit -m "chore(release): Plugin v${VERSION}"
          git tag "plugin-v${VERSION}"
          git push
          git push --tags

  # The tag above is pushed with GITHUB_TOKEN, which can't trigger ci-release.yml,
  # so publish the npm package directly here.
  publish:
    name: Publish npm package
    needs: release
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-publish-npm.yml
    with:
      ref: plugin-v${{ needs.release.outputs.version }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
