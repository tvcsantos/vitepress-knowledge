apiVersion: apps/v1
kind: Deployment
metadata:
  name: vitepress-knowledge-server
  labels:
    app: vitepress-knowledge-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vitepress-knowledge-server
  template:
    metadata:
      labels:
        app: vitepress-knowledge-server
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 1000
      containers:
        - name: server
          image: ghcr.io/tvcsantos/vitepress-knowledge-server:latest
          ports:
            - name: http
              containerPort: 5174
              protocol: TCP
          envFrom:
            - secretRef:
                name: vitepress-knowledge-server
            - configMapRef:
                name: vitepress-knowledge-server
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /usr/src/app/data
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

        - name: litellm
          image: ghcr.io/berriai/litellm:main-stable
          args: ["--config", "/app/config.yaml", "--port", "4000"]
          ports:
            - name: litellm
              containerPort: 4000
              protocol: TCP
          envFrom:
            - secretRef:
                name: vitepress-knowledge-litellm
          startupProbe:
            httpGet:
              path: /health/readiness
              port: litellm
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: litellm
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: litellm
            periodSeconds: 10
          volumeMounts:
            - name: litellm-config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "2Gi"

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: vitepress-knowledge-server
        - name: litellm-config
          configMap:
            name: vitepress-knowledge-litellm
