# Sensitive credentials — store values as base64-encoded strings or use a
# secrets manager (e.g. External Secrets Operator) to populate this resource.
# Generate base64: echo -n "your-value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: vitepress-knowledge-server
type: Opaque
stringData:
  # LLM provider API keys — fill in the ones you use
  GOOGLE_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  # LiteLLM sidecar — master key (must start with sk-)
  # Used by both the server (LITELLM_API_KEY) and the sidecar (LITELLM_MASTER_KEY).
  LITELLM_API_KEY: ""
  LITELLM_MASTER_KEY: ""
  # Azure OpenAI credentials (referenced by os.environ/... in litellm-configmap.yaml)
  AZURE_API_KEY: ""
  AZURE_API_BASE: ""
  # Admin token for site management API (POST/PATCH/DELETE /api/sites).
  # Leave empty to disable auth (not recommended for production).
  # Generate: openssl rand -hex 32
  ADMIN_TOKEN: ""
