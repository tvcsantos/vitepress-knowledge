# LiteLLM sidecar credentials - store values as base64-encoded strings or use
# a secrets manager (e.g. External Secrets Operator) to populate this resource.
# Generate base64: echo -n "your-value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: vitepress-knowledge-litellm
type: Opaque
stringData:
  # Master key - LiteLLM authenticates incoming requests against this.
  # Must match LITELLM_API_KEY in the vitepress-knowledge-server secret.
  # Must start with sk-. Generate: echo "sk-$(openssl rand -hex 24)"
  LITELLM_MASTER_KEY: ""
  # Azure OpenAI credentials (referenced via os.environ/... in litellm-configmap.yaml)
  AZURE_API_KEY: ""
  AZURE_API_BASE: ""
