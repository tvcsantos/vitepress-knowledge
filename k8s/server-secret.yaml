# Sensitive credentials - store values as base64-encoded strings or use a
# secrets manager (e.g. External Secrets Operator) to populate this resource.
# Generate base64: echo -n "your-value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: vitepress-knowledge-server
type: Opaque
stringData:
  # LiteLLM proxy key sent by the server as Authorization: Bearer <key>.
  # Must match LITELLM_MASTER_KEY in the litellm secret. Must start with sk-.
  LITELLM_API_KEY: ""
  # Admin token for site management API (POST/PATCH/DELETE /api/sites).
  # Leave empty to disable auth (not recommended for production).
  # Generate: openssl rand -hex 32
  ADMIN_TOKEN: ""
