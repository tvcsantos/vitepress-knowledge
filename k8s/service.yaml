apiVersion: v1
kind: Service
metadata:
  name: vitepress-knowledge-server
  labels:
    app: vitepress-knowledge-server
spec:
  selector:
    app: vitepress-knowledge-server
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    # Management port is intentionally not exposed here — it should only be
    # reachable within the cluster (e.g. from CI jobs or internal tooling).
    # To call it from within the cluster: <pod-ip>:5175 or use kubectl port-forward.
  type: ClusterIP
